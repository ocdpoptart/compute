###################
## LOOK AND FEEL ##
###################

# https://wiki.hyprland.org/Configuring/Variables

general {
	gaps_in = 0
	gaps_out = 0
	border_size = 0

	#Resize on Border True = clicking+dragging on borders to resize window
	resize_on_border = false

	# https://wiki.hyprland.org/Configuring/Tearing/ Check if applicable to turn on
	allow_tearing = false

	layout = dwindle
}

decoration {
	#rounding = 10
	#rounding_power = 2
	active_opacity = 1.0
	inactive_opacity = 0.90
	
	shadow {
		enabled = true
		range = 4
		render_power = 3
		color = rgba(1a1a1aee)
	}

	blur {
		enabled = true
		size = 3
		passes = 1
		vibrancy = 0.1696
	}
}

animations {
	# https://wiki.hyprland.org/Configuring/Animations/
	enabled = yes

	bezier = easeOutQuint,0.23,1,0.32,1
	bezier = easeInOutCubic,0.65,0.05,0.36,1
	bezier = linear,0,0,1,1
	bezier = almostLinear,0.5,0.5,0.75,1.0
	bezier = quick,0.15,0,0.1,1

	animation = global, 1, 10, default
	animation = border, 1, 5.39, easeOutQuint
	animation = windows, 1, 4.79, easeOutQuint
	animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
	animation = windowsOut, 1, 1.49, linear, popin 87%
	animation = fadeIn, 1, 1.73, almostLinear
	animation = fadeOut, 1, 1.46, almostLinear
	animation = fade, 1, 3.03, quick
	animation = layers, 1, 3.81, easeOutQuint
	animation = layersIn, 1, 4, easeOutQuint, fade
	animation = layersOut, 1, 1.5, linear, fade
	animation = fadeLayersIn, 1, 1.79, almostLinear
	animation = fadeLayersOut, 1, 1.39, almostLinear
	animation = workspaces, 1, 1.94, almostLinear, fade
	animation = workspacesIn, 1, 1.21, almostLinear, fade
	animation = workspacesOut, 1, 1.94, almostLinear, fade
}

#Smart gaps / No gaps when
	# https://wiki.hyprland.org/Configuring/Workspace-Rules/
	# Look into this, could let you have gaps/borders on every screen except main so things can both look nice and be proper ascpect ratio for video
	#workspace = w[tv1], gapsout:0, gapsin:0
	#windowrulev2 = borderrsize 0, floating:0, onworkspace:w[tv1]

dwindle {
	pseudotile = true #Allows feature keybind is $mainMod + P
	preserve_split = true #Dunno what it does but prev config says i want
	smart_split = true
}

master {
	new_status = slave
	allow_small_split = true
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
	force_default_wallpaper = -1 # 0 or 1 to disable anime wallpapers
	disable_hyprland_logo = false # true = disable random logo/anime girl back
}
